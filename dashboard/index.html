<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funnel Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --text1: #fff;
      --text2: rgba(255,255,255,0.5);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59,130,246,0.1);
      --yellow: #f59e0b;
      --yellow-bg: rgba(245,158,11,0.1);
      --purple: #a855f7;
      --purple-bg: rgba(168,85,247,0.1);
    }
    body { background: var(--bg); color: var(--text1); font-family: 'Inter', sans-serif; min-height: 100vh; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px; border-bottom: 1px solid var(--border); }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 1.05rem; font-weight: 800; }
    .topbar-badge { font-size: .7rem; font-weight: 700; background: var(--green-bg); color: var(--green); padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(34,197,94,0.2); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .last-updated { font-size: .72rem; color: var(--text2); }
    .refresh-btn { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: #fff; border-radius: 8px; padding: 7px 14px; font-size: .75rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    .range-bar { display: flex; gap: 6px; padding: 16px 28px; border-bottom: 1px solid var(--border); }
    .range-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 6px 16px; font-size: .78rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .range-btn.active { background: #fff; color: #000; border-color: #fff; }

    .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden; }
    .kpi-label { font-size: .72rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .kpi-value { font-size: 2.2rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .kpi-sub { font-size: .75rem; color: var(--text2); }
    .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi-card.green .kpi-accent { background: var(--green); }
    .kpi-card.blue .kpi-accent { background: var(--blue); }
    .kpi-card.yellow .kpi-accent { background: var(--yellow); }
    .kpi-card.red .kpi-accent { background: var(--red); }
    .kpi-card.purple .kpi-accent { background: var(--purple); }
    .kpi-card.green .kpi-value { color: var(--green); }
    .kpi-card.blue .kpi-value { color: var(--blue); }
    .kpi-card.yellow .kpi-value { color: var(--yellow); }
    .kpi-card.red .kpi-value { color: var(--red); }
    .kpi-card.purple .kpi-value { color: var(--purple); }

    .charts-row { display: grid; grid-template-columns: 1fr 320px; gap: 14px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
    .chart-title { font-size: .75rem; font-weight: 700; margin-bottom: 18px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }

    .pipeline-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
    .pipe-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
    .pipe-label { font-size: .68rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .pipe-count { font-size: 1.7rem; font-weight: 900; }
    .pipe-card.green .pipe-count { color: var(--green); }
    .pipe-card.blue .pipe-count { color: var(--blue); }
    .pipe-card.yellow .pipe-count { color: var(--yellow); }
    .pipe-card.red .pipe-count { color: var(--red); }
    .pipe-card.gray .pipe-count { color: rgba(255,255,255,0.5); }
    .pipe-card.teal .pipe-count { color: #2dd4bf; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .table-title { font-size: .75rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: .68rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .07em; padding: 12px 22px; border-bottom: 1px solid var(--border); }
    td { padding: 13px 22px; font-size: .82rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .status-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .68rem; font-weight: 700; }
    .pill-green  { background: var(--green-bg);  color: var(--green);  }
    .pill-blue   { background: var(--blue-bg);   color: var(--blue);   }
    .pill-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .pill-red    { background: var(--red-bg);    color: var(--red);    }
    .pill-gray   { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
    .pill-teal   { background: rgba(45,212,191,0.1); color: #2dd4bf;  }
    .pill-purple { background: var(--purple-bg); color: var(--purple); }

    .loading { color: var(--text2); font-size: .85rem; padding: 40px; text-align: center; }

    .scorecard-week { font-size: .72rem; color: var(--text2); margin-bottom: 14px; }
    .scorecard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .sc-card { background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .sc-metric { font-size: .68rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .sc-value { font-size: 1.45rem; font-weight: 800; line-height: 1; }
    .sc-goal { font-size: .68rem; color: var(--text2); margin-top: 4px; }
    .sc-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .sc-fill { height: 100%; border-radius: 2px; }
    .sc-green  { color: var(--green);  } .sc-fill-green  { background: var(--green); }
    .sc-yellow { color: var(--yellow); } .sc-fill-yellow { background: var(--yellow); }
    .sc-red    { color: var(--red);    } .sc-fill-red    { background: var(--red); }
    .sc-white  { color: #fff; }          .sc-fill-blue   { background: var(--blue); }

    .sc-table-wrap { margin-top: 28px; overflow-x: auto; }
    .sc-table { width: 100%; border-collapse: collapse; font-size: .78rem; font-family: inherit; }
    .sc-table th { background: rgba(255,255,255,0.05); color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; font-size: .65rem; padding: 9px 14px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .sc-table th:first-child { text-align: left; }
    .sc-table td { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: center; color: #fff; white-space: nowrap; }
    .sc-table td:first-child { text-align: left; color: #fff; font-weight: 600; }
    .sc-table tr:last-child td { border-bottom: none; }
    .sc-table tr:hover td { background: rgba(255,255,255,0.03); }
    .sc-table .col-goal { color: var(--blue); font-weight: 700; }
    .sc-table .col-actual-good { color: var(--green);  font-weight: 700; }
    .sc-table .col-actual-warn { color: var(--yellow); font-weight: 700; }
    .sc-table .col-actual-bad  { color: var(--red);    font-weight: 700; }
    .sc-table .col-actual-na   { color: #fff;           font-weight: 700; }

    .ai-health { display:flex; align-items:center; gap:16px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; }
    .ai-health-score { font-size:2.4rem; font-weight:900; line-height:1; }
    .ai-health-label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text2); margin-bottom:4px; }
    .ai-health-desc  { font-size:.82rem; color:#fff; font-weight:500; }
    .ai-items { display:flex; flex-direction:column; gap:12px; }
    .ai-item  { display:flex; gap:14px; align-items:flex-start; padding:14px 16px; border-radius:10px; border:1px solid var(--border); }
    .ai-item.high   { border-color:rgba(239,68,68,0.25);   background:rgba(239,68,68,0.05); }
    .ai-item.medium { border-color:rgba(245,158,11,0.25);  background:rgba(245,158,11,0.05); }
    .ai-item.good   { border-color:rgba(34,197,94,0.2);    background:rgba(34,197,94,0.04); }
    .ai-item.info   { border-color:rgba(59,130,246,0.2);   background:rgba(59,130,246,0.04); }
    .ai-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .ai-dot.high   { background:var(--red); }
    .ai-dot.medium { background:var(--yellow); }
    .ai-dot.good   { background:var(--green); }
    .ai-dot.info   { background:var(--blue); }
    .ai-item-title { font-size:.82rem; font-weight:700; color:#fff; margin-bottom:4px; }
    .ai-item-body  { font-size:.78rem; color:rgba(255,255,255,0.65); line-height:1.6; }
    .ai-divider    { border:none; border-top:1px solid var(--border); margin:18px 0; }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      .topbar, .range-bar { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Funnel Dashboard</div>
    <div class="topbar-badge">● LIVE</div>
  </div>
  <div class="topbar-right">
    <div class="last-updated" id="last-updated">Loading...</div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>


<div class="main">

  <div class="chart-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div class="chart-title" style="margin-bottom:0;">Weekly Scorecard</div>
      <div class="scorecard-week" id="scorecard-week"></div>
    </div>
    <div id="scorecard-wrap"><div class="loading">Loading scorecard...</div></div>
  </div>

  <div class="chart-card" id="ai-summary-card" style="display:none;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;">✦</div>
      <div>
        <div class="chart-title" style="margin-bottom:0;">Weekly Intelligence Summary</div>
        <div style="font-size:.68rem;color:var(--text2);margin-top:2px;">Based on live scorecard data</div>
      </div>
    </div>
    <div id="ai-summary-body"></div>
  </div>

</div>

<script>
  const CLOSE_KEY = 'api_3fknhFUCEFucJkQCbLa1OO.57qB50ijdey6IK0l2nZXik';
  const AUTH      = 'Basic ' + btoa(CLOSE_KEY + ':');
  let allLeads    = [];
  let currentRange = 'today';
  let leadsChart, statusChart;

  const PILL = {
    'New Free Course Lead':        'pill-blue',
    'Qualified application':       'pill-yellow',
    'Disqualified application':    'pill-red',
    'Partial submission':          'pill-gray',
    'VSL Call Booked':             'pill-teal',
    'Outbound booked call':        'pill-teal',
    'Upsell Call Booked':          'pill-teal',
    'Setter follow up':            'pill-teal',
    'Closer follow up':            'pill-teal',
    'Closed':                      'pill-green',
    'Deposit':                     'pill-green',
    'Affiliate Closed':            'pill-green',
    'No show':                     'pill-red',
    'Canceled':                    'pill-red',
    'No close':                    'pill-red',
    'Disqualified Close call':     'pill-red',
    'DQ lead':                     'pill-red',
    'DNC (Do not contact)':        'pill-red',
    'Fake Lead (#, @, name)':      'pill-red',
  };

  function getRange() {
    const now = new Date();
    if (currentRange === 'today') {
      const s = new Date(now); s.setHours(0,0,0,0); return { start: s, end: now };
    }
    if (currentRange === 'week') {
      const s = new Date(now); s.setDate(now.getDate() - now.getDay()); s.setHours(0,0,0,0); return { start: s, end: now };
    }
    if (currentRange === 'month') {
      return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: now };
    }
    return { start: new Date(0), end: now };
  }

  function filterLeads(leads) {
    const { start, end } = getRange();
    return leads.filter(l => { const d = new Date(l.date_created); return d >= start && d <= end; });
  }

  async function fetchAllLeads() {
    let leads = [], cursor = null, pages = 0;
    while (pages < 12) {
      let url = `https://api.close.com/api/v1/lead/?_limit=100&_fields=id,display_name,status_label,date_created&_order_by=-date_created`;
      if (cursor) url += `&_cursor=${encodeURIComponent(cursor)}`;
      const res  = await fetch(url, { headers: { 'Authorization': AUTH } });
      const data = await res.json();
      leads = leads.concat(data.data || []);
      if (!data.has_more || !data.cursor) break;
      cursor = data.cursor;
      pages++;
      const oldest = leads[leads.length - 1];
      if (oldest && (Date.now() - new Date(oldest.date_created)) > 90 * 86400000) break;
    }
    return leads;
  }

  function renderKPIs(filtered) {
    const total     = filtered.length;
    const closed    = filtered.filter(l => ['Closed','Deposit','Affiliate Closed'].includes(l.status_label)).length;
    const booked    = filtered.filter(l => ['VSL Call Booked','Outbound booked call','Upsell Call Booked'].includes(l.status_label)).length;
    const noshow    = filtered.filter(l => ['No show','Canceled'].includes(l.status_label)).length;
    const closeRate = total > 0 ? ((closed / total) * 100).toFixed(1) : '0.0';

    document.getElementById('kpi-grid').innerHTML = `
      <div class="kpi-card blue">
        <div class="kpi-accent"></div>
        <div class="kpi-label">New Leads</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">Entered funnel</div>
      </div>
      <div class="kpi-card yellow">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Calls Booked</div>
        <div class="kpi-value">${booked}</div>
        <div class="kpi-sub">VSL + outbound</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Closes</div>
        <div class="kpi-value">${closed}</div>
        <div class="kpi-sub">Closed + Deposit + Affiliate</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Close Rate</div>
        <div class="kpi-value">${closeRate}%</div>
        <div class="kpi-sub">Closes ÷ total leads</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-accent"></div>
        <div class="kpi-label">No Shows</div>
        <div class="kpi-value">${noshow}</div>
        <div class="kpi-sub">No show + canceled</div>
      </div>
    `;
  }

  function renderPipeline(leads) {
    const c = {};
    leads.forEach(l => { c[l.status_label] = (c[l.status_label]||0)+1; });
    const stages = [
      { label: 'New Leads',    keys: ['New Free Course Lead','DM Lead','OG Leads','Neutral','Partial submission'], color: 'blue'   },
      { label: 'Qualified',    keys: ['Qualified application'],                                                     color: 'yellow' },
      { label: 'Booked',       keys: ['VSL Call Booked','Outbound booked call','Upsell Call Booked'],               color: 'teal'   },
      { label: 'Follow Up',    keys: ['Setter follow up','Closer follow up'],                                       color: 'teal'   },
      { label: 'Closed',       keys: ['Closed','Deposit','Affiliate Closed'],                                       color: 'green'  },
      { label: 'No Show',      keys: ['No show','Canceled'],                                                        color: 'red'    },
      { label: 'Disqualified', keys: ['Disqualified application','Disqualified Close call','DQ lead','DNC (Do not contact)','Fake Lead (#, @, name)','No close'], color: 'red' },
    ];
    document.getElementById('pipeline-grid').innerHTML = stages.map(s => {
      const count = s.keys.reduce((sum, k) => sum + (c[k]||0), 0);
      return `<div class="pipe-card ${s.color}">
        <div class="pipe-label">${s.label}</div>
        <div class="pipe-count">${count}</div>
      </div>`;
    }).join('');
  }

  function renderLeadsChart(leads) {
    const labels = [], values = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0,10);
      labels.push(key.slice(5));
      values.push(leads.filter(l => l.date_created.slice(0,10) === key).length);
    }
    const ctx = document.getElementById('leads-chart').getContext('2d');
    if (leadsChart) leadsChart.destroy();
    leadsChart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data: values, backgroundColor: 'rgba(59,130,246,0.45)', borderColor: '#3b82f6', borderWidth: 1.5, borderRadius: 4 }] },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
          y: { ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } }
        }
      }
    });
  }

  function renderStatusChart(filtered) {
    const c = {};
    filtered.forEach(l => { c[l.status_label] = (c[l.status_label]||0)+1; });
    const sorted = Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,7);
    const ctx = document.getElementById('status-chart').getContext('2d');
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: sorted.map(s=>s[0]),
        datasets: [{ data: sorted.map(s=>s[1]), backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#2dd4bf','#f97316'], borderWidth: 0 }]
      },
      options: {
        plugins: { legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,0.55)', font: { size: 10 }, boxWidth: 10, padding: 8 } } },
        cutout: '62%'
      }
    });
  }

  function renderTable(filtered) {
    const recent = [...filtered].sort((a,b) => new Date(b.date_created)-new Date(a.date_created)).slice(0,30);
    document.getElementById('lead-count-label').textContent = `${filtered.length} total`;
    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${recent.map(l => {
            const d = new Date(l.date_created);
            const str = d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' · ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
            return `<tr>
              <td style="font-weight:600;">${l.display_name || '—'}</td>
              <td><span class="status-pill ${PILL[l.status_label]||'pill-gray'}">${l.status_label}</span></td>
              <td style="color:var(--text2);font-size:.75rem;">${str}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  function render() {
    const filtered = filterLeads(allLeads);
    renderKPIs(filtered);
    renderPipeline(filtered);
    renderLeadsChart(allLeads);
    renderStatusChart(filtered);
    renderTable(filtered);
  }

  function setRange(range, btn) {
    currentRange = range;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  async function loadAll() {
    document.getElementById('last-updated').textContent = 'Refreshing...';
    try {
      allLeads = await fetchAllLeads();
      render();
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch(e) {
      document.getElementById('kpi-grid').innerHTML = `<div class="loading" style="color:#ef4444;">Error: ${e.message}</div>`;
    }
  }

  // ── Scorecard ──────────────────────────────────────────────────────────────
  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2Koljpe91Y3rbz0C9cXzIxt9ZFlLk6plrxItZaE0-sQxaNAnGxxV7WSD-9f0qG7-0JVZFI7UySbCF/pub?output=csv&cachebust=' + Date.now();

  // Minimal CSV parser (handles quoted fields with commas)
  function parseCSVLine(line) {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur);
    return cols;
  }

  // Parse a value like "$1,234.56" or "45.00%" or "0.4567" into a display string + numeric
  function parseVal(raw) {
    if (!raw || raw.trim() === '' || raw === '#DIV/0!') return { display: '—', num: null };
    const s = raw.trim();
    if (s.startsWith('$')) {
      const n = parseFloat(s.replace(/[$,]/g, ''));
      return { display: s, num: isNaN(n) ? null : n };
    }
    if (s.endsWith('%')) {
      const n = parseFloat(s);
      return { display: s, num: isNaN(n) ? null : n };
    }
    const n = parseFloat(s);
    if (!isNaN(n)) {
      // if between 0 and 1, likely a raw fraction → show as %
      if (n > 0 && n < 1) return { display: (n * 100).toFixed(1) + '%', num: n * 100 };
      return { display: s, num: n };
    }
    return { display: s, num: null };
  }

  // Returns 'green' | 'yellow' | 'red' | null
  // yellow = within 20% of goal, red = more than 20% away
  function trackStatus(actual, goalRaw) {
    if (actual.num === null) return null;
    const g = goalRaw.trim();
    if (!g || g === '' || g === '#DIV/0!') return null;
    const lessThan = /^[<]/.test(g) || /[<]$/.test(g);
    const gNum = parseFloat(g.replace(/[%$<>, ]/g, ''));
    if (isNaN(gNum) || gNum === 0) return null;
    const aNum = actual.num;
    if (lessThan) {
      // goal is "stay below gNum"
      if (aNum < gNum) return 'green';
      if (aNum < gNum * 1.2) return 'yellow';
      return 'red';
    } else {
      if (aNum >= gNum) return 'green';
      if (aNum >= gNum * 0.8) return 'yellow';
      return 'red';
    }
  }

  async function loadScorecard() {
    try {
      const res = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vR2Koljpe91Y3rbz0C9cXzIxt9ZFlLk6plrxItZaE0-sQxaNAnGxxV7WSD-9f0qG7-0JVZFI7UySbCF/pub?output=csv&t=' + Date.now());
      const rawText = await res.text();
      // Collapse newlines inside quoted CSV fields so row indices stay predictable
      const text = rawText.replace(/"([^"]|\n)*"/g, m => m.replace(/\n/g, ' '));
      const lines = text.split('\n').filter(l => l.trim());
      if (lines.length < 4) throw new Error('Sheet empty');

      // Row 2 = dates (Jun-XX), Row 3 = day names, data starts row 4
      const dateRow    = parseCSVLine(lines[1]);
      const dayHeaders = dateRow.slice(1, 8).map(d => d.trim());
      const dateStart  = dayHeaders.find(d => /[A-Za-z]/.test(d)) || '';
      const dateEnd    = [...dayHeaders].reverse().find(d => /[A-Za-z]/.test(d)) || '';
      if (dateStart) document.getElementById('scorecard-week').textContent = dateStart + ' – ' + dateEnd;

      // col 0=name, 1-7=days (B-H), 8=goal (I), 9=weekly actual (J)
      const metrics = [];
      for (let r = 3; r < lines.length; r++) {
        const cols = parseCSVLine(lines[r]);
        const name = cols[0] ? cols[0].trim() : '';
        if (!name) continue;
        const days       = cols.slice(1, 8).map(v => (v || '').trim());
        const weeklyGoal = (cols[8] || '').trim();
        let weeklyActual = (cols[9] || '').trim();

        // If weekly actual is empty or an error, fall back to summing or averaging daily values
        const badVal = !weeklyActual || /^#/.test(weeklyActual);
        if (badVal) {
          const isPercent = days.some(v => v.endsWith('%'));
          if (!isPercent) {
            const sum = days.reduce((acc, v) => {
              const n = parseFloat(v.replace(/[^0-9.\-]/g, ''));
              return acc + (isNaN(n) ? 0 : n);
            }, 0);
            if (sum > 0) weeklyActual = String(sum);
          } else {
            // Average the non-empty daily % values
            const vals = days.filter(v => v.endsWith('%')).map(v => parseFloat(v)).filter(n => !isNaN(n));
            if (vals.length > 0) {
              const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
              weeklyActual = avg.toFixed(2) + '%';
            }
          }
        }

        metrics.push({ name, days, weeklyActual, weeklyGoal });
      }

      // --- SECTION SPLIT ---
      const LEADING = [
        'ad spend meta',
        'cost per lead (meta)',
        'roas - low ticket',
        'roas - total',
        'cpa - low ticket',
        'cash collected - high ticket',
        'cash collected - low ticket',
      ];
      const LEAD_FLOW = [
        'vsl views',
        'dials',
        'opt ins (leads)',
        'booked calls (upsells)',
      ];
      const SALES_CONV = [
        'show rate- high ticket',
        'close rate - high ticket',
        'close rate - low ticket',
        'sales - high ticket',
        'sales - low ticket',
        'total cash collected',
      ];
      const isLeading   = m => LEADING.includes(m.name.toLowerCase().trim());
      const isLeadFlow  = m => LEAD_FLOW.includes(m.name.toLowerCase().trim());
      const isSalesConv = m => SALES_CONV.includes(m.name.toLowerCase().trim());
      const leadingMetrics   = metrics.filter(isLeading);
      const leadFlowMetrics  = metrics.filter(m => !isLeading(m) && isLeadFlow(m));
      const salesConvMetrics = metrics.filter(m => !isLeading(m) && !isLeadFlow(m) && isSalesConv(m));
      const pipelineMetrics  = metrics.filter(m => !isLeading(m) && !isLeadFlow(m) && !isSalesConv(m));

      // --- CARD BUILDER ---
      function buildCard({ name, weeklyActual, weeklyGoal }) {
        const actual = parseVal(weeklyActual);
        const goal   = parseVal(weeklyGoal);
        const status = trackStatus(actual, weeklyGoal);
        const valCls = status === 'green' ? 'sc-green' : status === 'yellow' ? 'sc-yellow' : status === 'red' ? 'sc-red' : 'sc-white';
        let barHtml = '';
        if (goal.num !== null && actual.num !== null && goal.num > 0) {
          const pct = Math.min(100, Math.round((actual.num / goal.num) * 100));
          const fillCls = status === 'green' ? 'sc-fill-green' : status === 'yellow' ? 'sc-fill-yellow' : status === 'red' ? 'sc-fill-red' : 'sc-fill-blue';
          barHtml = `<div class="sc-bar"><div class="sc-fill ${fillCls}" style="width:${pct}%"></div></div>`;
        }
        return `<div class="sc-card">
          <div class="sc-metric">${name}</div>
          <div class="sc-value ${valCls}">${actual.display}</div>
          ${goal.display !== '—' ? `<div class="sc-goal">Goal: ${goal.display}</div>` : '<div class="sc-goal">No goal set</div>'}
          ${barHtml}
        </div>`;
      }

      // --- TABLE ROW BUILDER ---
      function buildTableRow({ name, days, weeklyActual, weeklyGoal }) {
        const actual = parseVal(weeklyActual);
        const goal   = parseVal(weeklyGoal);
        const status = trackStatus(actual, weeklyGoal);
        const actualCls = status === 'green' ? 'col-actual-good' : status === 'yellow' ? 'col-actual-warn' : status === 'red' ? 'col-actual-bad' : 'col-actual-na';
        const tdDays = days.map(v => `<td>${v || '—'}</td>`).join('');
        return `<tr><td>${name}</td>${tdDays}<td class="col-goal">${goal.display}</td><td class="${actualCls}">${actual.display}</td></tr>`;
      }

      // --- SECTION LABEL ---
      function sectionLabel(text) {
        return `<div style="grid-column:1/-1;margin:18px 0 6px;font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;">${text}</div>`;
      }
      function tableSectionRow(text, colCount) {
        return `<tr><td colspan="${colCount + 3}" style="padding:14px 12px 4px;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;border-bottom:1px solid rgba(255,255,255,0.06);">${text}</td></tr>`;
      }

      // --- RENDER ---
      const colCount = 7;
      const dayLabels = dayHeaders.length ? dayHeaders : ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const thDays = dayLabels.map(d => `<th>${d || '—'}</th>`).join('');

      const cardsHtml =
        sectionLabel('💰 Revenue & Cost') +
        leadingMetrics.map(buildCard).join('') +
        sectionLabel('🔥 Lead Flow') +
        leadFlowMetrics.map(buildCard).join('') +
        sectionLabel('🤝 Sales Conversion') +
        salesConvMetrics.map(buildCard).join('') +
        sectionLabel('📊 Pipeline Metrics') +
        pipelineMetrics.map(buildCard).join('');

      const tableRowsHtml =
        tableSectionRow('💰 Revenue & Cost', colCount) +
        leadingMetrics.map(buildTableRow).join('') +
        tableSectionRow('🔥 Lead Flow', colCount) +
        leadFlowMetrics.map(buildTableRow).join('') +
        tableSectionRow('🤝 Sales Conversion', colCount) +
        salesConvMetrics.map(buildTableRow).join('') +
        tableSectionRow('📊 Pipeline Metrics', colCount) +
        pipelineMetrics.map(buildTableRow).join('');

      const table = `<div class="sc-table-wrap">
        <table class="sc-table">
          <thead><tr><th>Metric</th>${thDays}<th>Goal</th><th>Weekly Actual</th></tr></thead>
          <tbody>${tableRowsHtml}</tbody>
        </table>
      </div>`;

      document.getElementById('scorecard-wrap').innerHTML =
        `<div class="scorecard-grid">${cardsHtml || '<div class="loading">No data found</div>'}</div>${table}`;

      generateSummary(metrics);
    } catch (e) {
      document.getElementById('scorecard-wrap').innerHTML =
        `<div class="loading" style="color:#ef4444;">Scorecard error: ${e.message}</div>`;
    }
  }

  const SUMMARY_EXCLUDE = ['vsl engagement', 'vsl'];

  function generateSummary(metrics) {
    const analyzed = metrics
      .filter(m => !SUMMARY_EXCLUDE.some(ex => m.name.toLowerCase().includes(ex)))
      .map(m => {
        const actual = parseVal(m.weeklyActual);
        const goal   = parseVal(m.weeklyGoal);
        const status = trackStatus(actual, m.weeklyGoal);
        const pctOfGoal = (actual.num !== null && goal.num !== null && goal.num > 0)
          ? Math.round((actual.num / goal.num) * 100) : null;
        return { ...m, actual, goal, status, pctOfGoal };
      }).filter(m => m.status !== null);

    if (!analyzed.length) return;

    const red    = analyzed.filter(m => m.status === 'red').sort((a,b) => (a.pctOfGoal||0)-(b.pctOfGoal||0));
    const yellow = analyzed.filter(m => m.status === 'yellow').sort((a,b) => (a.pctOfGoal||0)-(b.pctOfGoal||0));
    const green  = analyzed.filter(m => m.status === 'green');

    const total  = analyzed.length;
    const score  = Math.round(((green.length + yellow.length * 0.5) / total) * 100);
    const healthColor = score >= 70 ? 'var(--green)' : score >= 45 ? 'var(--yellow)' : 'var(--red)';
    const healthLabel = score >= 70 ? 'On Track' : score >= 45 ? 'Needs Attention' : 'Behind';
    const healthDesc  = score >= 70
      ? `${green.length} of ${total} metrics are hitting goal. Keep the momentum.`
      : score >= 45
      ? `${red.length} metric${red.length !== 1 ? 's' : ''} are significantly behind. Focus there first.`
      : `Most metrics are off track. Prioritize the highest-revenue levers below.`;

    let items = [];

    // Priority 1: biggest red gaps
    red.forEach((m, i) => {
      const gap = m.pctOfGoal !== null ? `at ${m.pctOfGoal}% of goal` : 'below goal';
      const lever = i === 0
        ? `This is your #1 lever this week. Every point of improvement here has the most downstream impact on revenue. Identify what's blocking it and remove that friction today.`
        : `Address this after ${red[0].name}. Small gains here compound quickly.`;
      items.push({ type: 'high', title: `↑ Prioritize: ${m.name} (${gap})`, body: lever });
    });

    // Priority 2: yellow close to goal
    yellow.forEach(m => {
      const gap = m.pctOfGoal !== null ? `${m.pctOfGoal}% of goal` : 'close to goal';
      items.push({
        type: 'medium',
        title: `⚡ Quick Win: ${m.name} (${gap})`,
        body: `You're within 20% of target — a focused push today could flip this green. This is low-effort, high-payoff.`
      });
    });

    // Overall recommendation
    const topRed = red[0];
    if (topRed) {
      items.push({
        type: 'info',
        title: `📌 This Week's Focus`,
        body: `If you could only fix one thing, fix ${topRed.name}. It's the furthest from goal and likely has the highest revenue impact. Everything else is secondary until that moves.`
      });
    }

    const html = `
      <div class="ai-health">
        <div class="ai-health-score" style="color:${healthColor}">${score}%</div>
        <div>
          <div class="ai-health-label">Overall Health — ${healthLabel}</div>
          <div class="ai-health-desc">${healthDesc}</div>
        </div>
      </div>
      <div class="ai-items">
        ${items.map(item => `
          <div class="ai-item ${item.type}">
            <div class="ai-dot ${item.type}"></div>
            <div>
              <div class="ai-item-title">${item.title}</div>
              <div class="ai-item-body">${item.body}</div>
            </div>
          </div>
        `).join('')}
      </div>`;

    document.getElementById('ai-summary-body').innerHTML = html;
    document.getElementById('ai-summary-card').style.display = 'block';
  }

  loadAll();
  loadScorecard();
  setInterval(loadAll, 5 * 60 * 1000);
  setInterval(loadScorecard, 10 * 60 * 1000);
</script>
</body>
</html>
