<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Ad Ventur</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; }

    /* Gate */
    #gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .gate-box { background: linear-gradient(135deg, #07121f, #0d2240); border: 1px solid rgba(74,158,255,0.2); border-radius: 14px; padding: 40px 32px; text-align: center; width: 100%; max-width: 380px; margin: 0 20px; }
    .gate-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 6px; }
    .gate-sub { font-size: 0.8rem; color: #fff; margin-bottom: 28px; }
    .gate-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; padding: 12px 16px; margin-bottom: 12px; outline: none; }
    .gate-input:focus { border-color: rgba(74,158,255,0.5); }
    .gate-btn { width: 100%; background: #1a47ff; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; padding: 13px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .gate-btn:hover { background: #1338d4; }
    .gate-error { font-size: 0.78rem; color: #f87171; margin-top: 10px; display: none; }

    #dashboard { display: none; }

    /* Header */
    .dash-header { background: #000; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .dash-title { font-size: 1.05rem; font-weight: 900; }
    .dash-title span { color: #7dd8f8; }
    .dash-meta { font-size: 0.7rem; color: #fff; margin-top: 3px; }
    .refresh-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 700; padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 14px 18px; cursor: pointer; white-space: nowrap; transition: color 0.2s; }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #7dd8f8; border-bottom-color: #1a47ff; }

    /* Date filter bar */
    .filter-bar { padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .presets { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .preset-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .preset-btn.active { background: #1a47ff; border-color: #1a47ff; color: #fff; }
    .filter-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px; }
    .date-range { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .date-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; padding: 6px 10px; outline: none; color-scheme: dark; }
    .date-input:focus { border-color: rgba(74,158,255,0.5); }
    .date-sep { font-size: 0.72rem; color: #fff; }
    .apply-btn { background: #1a47ff; border: none; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 700; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .apply-btn:hover { background: #1338d4; }
    .filter-label { font-size: 0.65rem; font-weight: 700; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Tab content */
    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* Hero metrics row */
    .hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .hero-card { background: linear-gradient(135deg, #07121f, #0d2240); border: 1px solid rgba(74,158,255,0.3); border-radius: 12px; padding: 22px 20px; position: relative; overflow: hidden; }
    .hero-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #1a47ff, #7dd8f8); }
    .hero-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #7dd8f8; margin-bottom: 10px; }
    .hero-value { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
    .hero-value.green { color: #4ade80; }
    .hero-value.yellow { color: #facc15; }
    .hero-value.red { color: #f87171; }

    /* Divider */
    .section-divider { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7dd8f8; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(74,158,255,0.15); }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 28px; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #7dd8f8; margin-bottom: 7px; }
    .stat-value { font-size: 1.3rem; font-weight: 900; color: #fff; line-height: 1; }
    .stat-value.green { color: #4ade80; }
    .stat-value.yellow { color: #facc15; }
    .stat-value.red { color: #f87171; }

    @media (max-width: 700px) { .hero-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 400px) { .hero-grid { grid-template-columns: 1fr 1fr; } .hero-value { font-size: 1.5rem; } }

    .loading { text-align: center; padding: 60px 0; color: #fff; font-size: 0.82rem; }

    /* Table */
    .table-wrap { overflow-x: auto; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.76rem; min-width: 600px; }
    thead tr { background: rgba(74,158,255,0.07); }
    th { text-align: left; padding: 11px 14px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #7dd8f8; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.07); }
    td { padding: 10px 14px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .badge-green { background: rgba(74,222,128,0.12); color: #4ade80; }
    .badge-red { background: rgba(248,113,113,0.12); color: #f87171; }
    .badge-yellow { background: rgba(250,204,21,0.12); color: #facc15; }
    .badge-blue { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .no-records { color: #fff; font-size: 0.82rem; padding: 20px 0; }

    /* Scorecard */
    .sc-sheet-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .sc-tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .sc-tab-btn:hover { background: rgba(255,255,255,0.1); }
    .sc-tab-btn.active { background: #1a47ff; border-color: #1a47ff; }
    .sc-week-banner { background: linear-gradient(135deg, #07121f, #0d2240); border: 1px solid rgba(74,158,255,0.2); border-radius: 10px; padding: 16px 22px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .sc-week-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7dd8f8; }
    .sc-week-dates { font-size: 0.9rem; font-weight: 900; color: #fff; }
    .sc-section { margin-bottom: 28px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); }
    .sc-section-header { display: flex; align-items: center; gap: 10px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; padding: 12px 18px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sc-table-wrap { overflow-x: auto; }
    .sc-table { width: 100%; border-collapse: collapse; font-size: 0.74rem; min-width: 700px; }
    .sc-table thead tr { background: rgba(0,0,0,0.3); }
    .sc-table th { padding: 9px 14px; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.35); white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .sc-table th.sc-metric-col { text-align: left; min-width: 200px; }
    .sc-table th.sc-today-th { color: #7dd8f8; }
    .sc-table th.sc-week-th { color: rgba(74,158,255,0.7); border-left: 1px solid rgba(74,158,255,0.12); }
    .sc-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); text-align: center; vertical-align: middle; }
    .sc-table td.sc-metric-name { text-align: left; font-weight: 600; font-size: 0.74rem; color: #fff; white-space: normal; min-width: 200px; }
    .sc-table td.sc-cell { color: #fff; }
    .sc-table td.sc-today-cell { background: rgba(74,158,255,0.05); }
    .sc-table td.sc-week-col { background: rgba(74,158,255,0.03); border-left: 1px solid rgba(74,158,255,0.1); }
    .sc-table tr:last-child td { border-bottom: none; }
    .sc-table tr:hover td { background: rgba(255,255,255,0.02); }
    .sc-table tr:hover td.sc-today-cell { background: rgba(74,158,255,0.07); }
    .sc-empty { color: rgba(255,255,255,0.18); font-size: 0.72rem; }
    .sc-val { font-weight: 700; }
    .sc-pct-cell { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .sc-bar-track { width: 56px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .sc-bar-fill { height: 100%; border-radius: 2px; }
    .sc-table td.sc-green { background: rgba(74,222,128,0.1); color: #4ade80; }
    .sc-table td.sc-yellow { background: rgba(250,204,21,0.1); color: #facc15; }
    .sc-table td.sc-red { background: rgba(248,113,113,0.1); color: #f87171; }
    .sc-table th.sc-goal-th { color: rgba(255,255,255,0.5); border-left: 1px solid rgba(255,255,255,0.07); }
    .sc-table td.sc-goal-col { border-left: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.45); font-size: 0.7rem; font-weight: 700; }

    @media (max-width: 600px) {
      .dash-header { padding: 14px 16px; }
      .filter-bar { padding: 12px 16px; }
      .tab-content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-divider { display: none; }
    }
  </style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <p class="gate-title">Ad Ventur Dashboard</p>
    <p class="gate-sub">Enter password to access</p>
    <input type="password" id="passInput" class="gate-input" placeholder="Password" />
    <button class="gate-btn" onclick="checkPass()">Enter</button>
    <p class="gate-error" id="gateError">Incorrect password.</p>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div>
      <p class="dash-title">Ad <span>Ventur</span> Dashboard</p>
      <p class="dash-meta" id="lastUpdated">Loading...</p>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sales', this)">Sales Dashboard</button>
    <button class="tab-btn" onclick="switchTab('setter', this)">Setter Dashboard</button>
    <button class="tab-btn" onclick="switchTab('scorecard', this)">Scorecard</button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <div class="presets">
      <button class="preset-btn active" id="preset-all" onclick="setPreset('all', this)">All Time</button>
      <button class="preset-btn" id="preset-today" onclick="setPreset('today', this)">Today</button>
      <button class="preset-btn" id="preset-yesterday" onclick="setPreset('yesterday', this)">Yesterday</button>
      <button class="preset-btn" id="preset-7d" onclick="setPreset('7d', this)">Last 7 Days</button>
      <button class="preset-btn" id="preset-30d" onclick="setPreset('30d', this)">Last 30 Days</button>
      <button class="preset-btn" id="preset-month" onclick="setPreset('month', this)">This Month</button>
    </div>
    <div class="filter-divider"></div>
    <div class="date-range">
      <input type="date" id="fromDate" class="date-input" />
      <span class="date-sep">to</span>
      <input type="date" id="toDate" class="date-input" />
      <button class="apply-btn" onclick="applyCustom()">Apply</button>
    </div>
  </div>

  <div id="tab-sales" class="tab-content active"><div class="loading">Loading...</div></div>
  <div id="tab-setter" class="tab-content"><div class="loading">Coming soon...</div></div>
  <div id="tab-scorecard" class="tab-content"><div class="loading">Loading scorecard...</div></div>
</div>

<script>
  const TOKEN = ['pat0zU08fdB3v', 'ESnh.99a8d483c38a7cb35f54b6ff', 'af5c8d217ec89606ce42550beabdeb5d81d13fff'].join('');
  const BASE  = 'appiMw8gpaLv2WITA';
  const PASS  = '500k/m';

  // Cached records
  let cache = { closer: [], dialer: [], followup: [] };
  let filterFrom = null;
  let filterTo   = null;

  // Gate
  function unlock() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  }

  function checkPass() {
    if (document.getElementById('passInput').value === PASS) {
      localStorage.setItem('av_auth', '1');
      unlock();
    } else {
      document.getElementById('gateError').style.display = 'block';
    }
  }
  document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });

  if (localStorage.getItem('av_auth') === '1') unlock();

  // Tabs
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
    document.querySelector('.filter-bar').style.display = id === 'scorecard' ? 'none' : '';
  }

  // Date helpers
  function toISO(d) { return d.toISOString().substring(0, 10); }
  function today()   { const d = new Date(); return toISO(d); }
  function daysAgo(n){ const d = new Date(); d.setDate(d.getDate() - n); return toISO(d); }
  function monthStart(){ const d = new Date(); d.setDate(1); return toISO(d); }

  function setPreset(preset, btn) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = today();
    if (preset === 'all')       { filterFrom = null; filterTo = null; }
    else if (preset === 'today')     { filterFrom = t; filterTo = t; }
    else if (preset === 'yesterday') { const y = daysAgo(1); filterFrom = y; filterTo = y; }
    else if (preset === '7d')        { filterFrom = daysAgo(6); filterTo = t; }
    else if (preset === '30d')       { filterFrom = daysAgo(29); filterTo = t; }
    else if (preset === 'month')     { filterFrom = monthStart(); filterTo = t; }
    // sync date inputs
    document.getElementById('fromDate').value = filterFrom || '';
    document.getElementById('toDate').value   = filterTo   || '';
    renderAll();
  }

  function applyCustom() {
    filterFrom = document.getElementById('fromDate').value || null;
    filterTo   = document.getElementById('toDate').value   || null;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    renderAll();
  }

  function filterRecords(records, dateField) {
    if (!filterFrom && !filterTo) return records;
    return records.filter(r => {
      const raw = r.fields[dateField];
      if (!raw) return false;
      const d = raw.substring(0, 10);
      if (filterFrom && d < filterFrom) return false;
      if (filterTo   && d > filterTo)   return false;
      return true;
    });
  }

  // Fetch with pagination
  async function fetchAll(tableName) {
    const url = `https://api.airtable.com/v0/${BASE}/${encodeURIComponent(tableName)}`;
    const headers = { Authorization: `Bearer ${TOKEN}` };
    let records = [], offset = null;
    do {
      const p = new URLSearchParams({ pageSize: '100' });
      if (offset) p.append('offset', offset);
      const res = await fetch(`${url}?${p}`, { headers });
      const data = await res.json();
      if (data.records) records = records.concat(data.records);
      offset = data.offset || null;
    } while (offset);
    return records;
  }

  // Helpers
  const n   = v => parseFloat(v) || 0;
  const $   = v => { const x = n(v); return x === 0 ? '$0' : '$' + x.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); };
  const pct = (a, b) => b ? Math.round((a / b) * 100) + '%' : '0%';

  function badge(val) {
    if (!val) return '<span class="badge badge-blue">N/A</span>';
    const v = val.toLowerCase();
    if (v.includes('close') || v.includes('sold') || v.includes('won')) return `<span class="badge badge-green">${val}</span>`;
    if (v.includes('cancel') || v.includes('no show') || v.includes('lost')) return `<span class="badge badge-red">${val}</span>`;
    if (v.includes('follow') || v.includes('fu')) return `<span class="badge badge-yellow">${val}</span>`;
    return `<span class="badge badge-blue">${val}</span>`;
  }

  function card(label, value, cls) {
    return `<div class="stat-card"><p class="stat-label">${label}</p><p class="stat-value${cls ? ' '+cls : ''}">${value}</p></div>`;
  }

  function makeTable(headers, rows) {
    if (!rows.length) return '<p class="no-records">No records found for this date range.</p>';
    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(r => `<tr>${r.map(c => `<td>${c ?? ''}</td>`).join('')}</tr>`).join('');
    return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  // Renderers
  function renderSales() {
    const records = filterRecords(cache.closer, 'Date').filter(r => r.fields['Calls Booked'] !== undefined || r.fields['Total Cash Collected'] !== undefined);
    const f = r => r.fields;

    const booked    = records.reduce((s,r) => s + n(f(r)['Calls Booked']), 0);
    const showed    = records.reduce((s,r) => s + n(f(r)['Calls Showed']), 0);
    const cancelled = records.reduce((s,r) => s + n(f(r)['Cancelled Calls']), 0);
    const disq      = records.reduce((s,r) => s + n(f(r)['Disqualified Calls']), 0);
    const closed    = records.reduce((s,r) => s + n(f(r)['Deals Closed']), 0);
    const deps      = records.reduce((s,r) => s + n(f(r)['Deposits']), 0);
    const cash      = records.reduce((s,r) => s + n(f(r)['Total Cash Collected']), 0);
    const rev       = records.reduce((s,r) => s + n(f(r)['Total Revenue']), 0);
    const depCash   = records.reduce((s,r) => s + n(f(r)['Deposits Cash Collected']), 0);

    const kept = booked - cancelled;

    const cashPerBooked = booked ? Math.round(cash / booked) : 0;

    // KPI goals from scorecard
    function getScGoal(metricName) {
      if (!scorecardData) return null;
      const row = scorecardData.find(r => r[0] && r[0].trim().toLowerCase() === metricName.toLowerCase());
      if (!row) return null;
      const g = parseFloat(row[8]);
      return isNaN(g) ? null : g;
    }
    function kpiClass(rawVal, goal) {
      if (goal === null) return 'yellow';
      if (rawVal >= goal) return 'green';
      if (rawVal >= goal * 0.8) return 'yellow';
      return 'red';
    }
    function kpiClassInverse(rawVal, goal) {
      if (goal === null) return 'yellow';
      if (rawVal <= goal) return 'green';
      if (rawVal <= goal * 1.2) return 'yellow';
      return 'red';
    }

    const closeRateGoal  = getScGoal('close rate');
    const showRateGoal   = getScGoal('total show up rate');
    const dqRateGoal     = getScGoal('closing dq rate');

    const closeRateBookedRaw = booked ? closed / booked : 0;
    const closeRateKeptRaw   = kept   ? closed / kept   : 0;
    const showRateRaw        = booked ? showed / booked : 0;
    const showRateKeptRaw    = kept   ? showed / kept   : 0;
    const dqRateRaw          = showed ? disq   / showed : 0;

    // Pull ad spend from scorecard matching the active date filter
    let adSpend = 0;
    if (scorecardData) {
      const adRow = scorecardData.find(r => r[0] && r[0].trim().toLowerCase() === 'ad spend meta');
      const dateRow = scorecardData[1];
      if (adRow && dateRow) {
        [1,2,3,4,5,6,7].forEach(i => {
          const raw = dateRow[i];
          if (!raw) return;
          const d = new Date(raw).toISOString().substring(0, 10);
          if (filterFrom && d < filterFrom) return;
          if (filterTo && d > filterTo) return;
          adSpend += parseFloat(adRow[i]) || 0;
        });
      }
    }
    const roasRaw = adSpend ? cash / adSpend : 0;
    const roas = adSpend ? roasRaw.toFixed(2) + 'x' : '—';
    const roasColor = adSpend ? kpiClass(roasRaw, 3) : '';
    const adSpendDisplay = adSpend ? $(adSpend) : '—';

    const html = `
      <div class="hero-grid">
        <div class="hero-card"><p class="hero-label">Cash / Booked Call</p><p class="hero-value green">${$(cashPerBooked)}</p></div>
        <div class="hero-card"><p class="hero-label">Cash Collected</p><p class="hero-value green">${$(cash)}</p></div>
        <div class="hero-card"><p class="hero-label">ROAS</p><p class="hero-value ${roasColor}">${roas}</p></div>
        <div class="hero-card"><p class="hero-label">Ad Spend</p><p class="hero-value">${adSpendDisplay}</p></div>
      </div>

      <p class="section-divider">Performance Metrics</p>
      <div class="stats-grid">
        ${card('Calls Booked', booked)}
        ${card('Live Calls', showed)}
        ${card('Kept Calls', kept)}
        ${card('Deals Closed', closed)}
        ${card('Deposits', deps)}
        ${card('Cancellations', cancelled)}
        ${card('Close Rate (Booked)', pct(closed, booked), kpiClass(closeRateBookedRaw, closeRateGoal))}
        ${card('Close Rate (Kept)', pct(closed, kept), kpiClass(closeRateKeptRaw, closeRateGoal))}
        ${card('Show Rate', pct(showed, booked), kpiClass(showRateRaw, showRateGoal))}
        ${card('Show Rate (Kept)', pct(showed, kept), kpiClass(showRateKeptRaw, showRateGoal))}
        ${card('Cancellation Rate', pct(cancelled, booked))}
        ${card('DQ Rate', pct(disq, showed), kpiClassInverse(dqRateRaw, dqRateGoal))}
        ${card('Revenue Generated', $(rev))}
        ${card('Deposits Collected', $(depCash))}
        ${card('AOV', closed ? $(Math.round(cash / closed)) : '$0')}
      </div>`;

    document.getElementById('tab-sales').innerHTML = html;
  }

  function renderAll() {
    renderSales();
  }

  async function loadAll() {
    document.getElementById('tab-sales').innerHTML = '<div class="loading">Loading...</div>';
    document.getElementById('tab-scorecard').innerHTML = '<div class="loading">Loading scorecard...</div>';
    const [closer, dialer, followup] = await Promise.all([
      fetchAll('EOD Closer'),
      fetchAll('EOD Dialer'),
      fetchAll('Follow Up Payment')
    ]);
    cache = { closer, dialer, followup };
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();
    renderAll();
    loadScorecard();
  }

  // Scorecard
  const SCORECARD_URL = 'https://script.google.com/macros/s/AKfycbz9FvS46S_-kdwM1LPc2eoBh7p8BMKPFbK2QlQfRD8pK_UQa3EU7a00B6PpgFrZUAg0QA/exec';

  const SC_GROUPS = [
    { label: 'Paid Traffic', color: '#1a47ff', metrics: [
      { name: 'Ad Spend Meta', fmt: 'dollar' },
      { name: 'Cost Per Click', fmt: 'dollar' },
      { name: 'CPM (1000)', fmt: 'dollar' },
      { name: 'CTR Link', fmt: 'pct' },
      { name: 'Hook Rate', fmt: 'pct' },
      { name: 'Landing Page Connect Rate', fmt: 'pct' },
    ]},
    { label: 'VSL', color: '#7c3aed', metrics: [
      { name: 'VSL Page Visits', fmt: 'number' },
      { name: 'VSL Play Rate', fmt: 'pct' },
      { name: 'VSL Engagement Rate', fmt: 'pct' },
      { name: 'VSL Conversion rate (Booked call/VSL plays)', fmt: 'pct' },
    ]},
    { label: 'Applications', color: '#0891b2', metrics: [
      { name: 'Applications Submited (meta)', fmt: 'number' },
      { name: 'Application Completion Rate (meta)', fmt: 'pct' },
      { name: 'Cost Per Qualified Application (Meta)', fmt: 'dollar' },
    ]},
    { label: 'Email', color: '#059669', metrics: [
      { name: 'Confirmation Email Open Rate', fmt: 'pct' },
      { name: 'Confirmation Email Click Thru Rate', fmt: 'pct' },
    ]},
    { label: 'Dialing', color: '#d97706', metrics: [
      { name: 'Dials', fmt: 'number' },
      { name: 'Pick up rate', fmt: 'pct' },
      { name: 'Connect rate to booked calls', fmt: 'pct' },
    ]},
    { label: 'Calls & Closing', color: '#e11d48', metrics: [
      { name: 'Total Calls Booked', fmt: 'number' },
      { name: 'Total Calls Show', fmt: 'number' },
      { name: 'Total Show Up Rate', fmt: 'pct' },
      { name: 'Setter booked calls', fmt: 'number' },
      { name: 'setter booked calls shown', fmt: 'number' },
      { name: 'setter booked call show up rate', fmt: 'pct' },
      { name: 'Cancelled calls (Not setter booked calls)', fmt: 'number' },
      { name: 'Canceled Calls (Setter booked calls)', fmt: 'number' },
      { name: 'Closing DQ Rate', fmt: 'pct' },
      { name: 'Close Rate', fmt: 'pct' },
    ]},
    { label: 'Revenue', color: '#16a34a', metrics: [
      { name: 'AOV Sales Team (past 30 days)', fmt: 'dollar' },
      { name: 'Sales - Deals closed', fmt: 'number' },
      { name: 'Depos', fmt: 'number' },
      { name: 'Cash Collected', fmt: 'dollar' },
      { name: 'Roas', fmt: 'number' },
      { name: 'Cost per Booked Call', fmt: 'dollar' },
      { name: 'Cash collected per booked call', fmt: 'dollar' },
    ]},
  ];

  let scorecardData = null;

  function scFmtVal(v, fmt) {
    if (v === '' || v === null || v === undefined) return null;
    const num = parseFloat(v);
    if (isNaN(num)) return null;
    if (fmt === 'dollar') {
      return { display: '$' + num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) };
    }
    if (fmt === 'pct') {
      const pv = num <= 1 ? num * 100 : num;
      return { display: pv.toFixed(1) + '%', bar: Math.min(pv, 100) };
    }
    return { display: num % 1 === 0 ? num.toString() : num.toFixed(2) };
  }

  function kpiColor(rawVal, rawGoal) {
    if (rawGoal === '' || rawGoal === null || rawGoal === undefined) return null;
    const g = parseFloat(rawGoal);
    if (isNaN(g)) return null;
    if (rawVal === '' || rawVal === null || rawVal === undefined) return null;
    const v = parseFloat(rawVal);
    if (isNaN(v)) return null;
    if (v >= g) return 'sc-green';
    if (v >= g * 0.8) return 'sc-yellow';
    return 'sc-red';
  }

  function scCell(v, fmt, color, isToday, goal) {
    const result = scFmtVal(v, fmt);
    const kpi = kpiColor(v, goal);
    let cls = 'sc-cell';
    if (kpi) cls += ' ' + kpi;
    else if (isToday) cls += ' sc-today-cell';
    if (!result) return `<td class="${cls}"><span class="sc-empty">—</span></td>`;
    if (result.bar !== undefined) {
      const barColor = kpi ? (kpi === 'sc-green' ? '#4ade80' : kpi === 'sc-yellow' ? '#facc15' : '#f87171') : color;
      return `<td class="${cls}"><div class="sc-pct-cell"><span class="sc-val">${result.display}</span><div class="sc-bar-track"><div class="sc-bar-fill" style="width:${result.bar}%;background:${barColor}"></div></div></div></td>`;
    }
    return `<td class="${cls}"><span class="sc-val">${result.display}</span></td>`;
  }

  function renderScorecard() {
    if (!scorecardData) return;
    const data = scorecardData;
    const dateRow = data[1];
    const DAY_COLS = [1,2,3,4,5,6,7];
    const SUMMARY_COL = 9;
    const today = new Date().toISOString().substring(0,10);
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const dayLabels = DAY_COLS.map(i => {
      if (!dateRow[i]) return '';
      const d = new Date(dateRow[i]);
      return DAY_NAMES[d.getUTCDay()] + ' ' + (d.getUTCMonth()+1) + '/' + d.getUTCDate();
    });

    const firstDate = new Date(dateRow[1]);
    const lastDate  = new Date(dateRow[7]);
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const weekRange = `${MONTHS[firstDate.getUTCMonth()]} ${firstDate.getUTCDate()} - ${MONTHS[lastDate.getUTCMonth()]} ${lastDate.getUTCDate()}, ${lastDate.getUTCFullYear()}`;

    const todayColIdx = DAY_COLS.find(i => dateRow[i] && new Date(dateRow[i]).toISOString().substring(0,10) === today);

    const metricMap = {};
    data.forEach(row => { if (row[0]) metricMap[row[0].trim().toLowerCase()] = row; });

    const tabBtns = scorecardSheets.map(name =>
      `<button class="sc-tab-btn${name === scorecardCurrent ? ' active' : ''}" onclick="loadScorecard('${name}')">${name}</button>`
    ).join('');

    let html = `
      <div class="sc-sheet-tabs">${tabBtns}</div>
      <div class="sc-week-banner"><span class="sc-week-title">Current Week</span><span class="sc-week-dates">${weekRange}</span></div>`;

    SC_GROUPS.forEach(group => {
      const ths = dayLabels.map((label, i) => {
        const isTd = DAY_COLS[i] === todayColIdx;
        return `<th class="${isTd ? 'sc-today-th' : ''}">${label || '—'}</th>`;
      }).join('');

      const trs = group.metrics.map(m => {
        const row = metricMap[m.name.trim().toLowerCase()];
        const goal = row ? row[8] : null;
        const goalResult = scFmtVal(goal, m.fmt);
        const goalTd = goalResult
          ? `<td class="sc-goal-col"><span>${goalResult.display}</span></td>`
          : `<td class="sc-goal-col"><span class="sc-empty">—</span></td>`;
        const tds = DAY_COLS.map(i => scCell(row ? row[i] : null, m.fmt, group.color, i === todayColIdx, goal)).join('');
        const sumRaw = row ? row[SUMMARY_COL] : null;
        const sumResult = scFmtVal(sumRaw, m.fmt);
        const sumKpi = kpiColor(sumRaw, goal);
        const sumCls = 'sc-cell sc-week-col' + (sumKpi ? ' ' + sumKpi : '');
        const sumTd = sumResult
          ? `<td class="${sumCls}"><span class="sc-val">${sumResult.display}</span></td>`
          : `<td class="${sumCls}"><span class="sc-empty">—</span></td>`;
        return `<tr><td class="sc-metric-name">${m.name}</td>${goalTd}${tds}${sumTd}</tr>`;
      }).join('');

      html += `<div class="sc-section">
        <div class="sc-section-header" style="border-left:3px solid ${group.color};padding-left:14px;">
          <span class="sc-dot" style="background:${group.color}"></span>${group.label}
        </div>
        <div class="sc-table-wrap"><table class="sc-table">
          <thead><tr>
            <th class="sc-metric-col">Metric</th><th class="sc-goal-th">Daily Goal</th>${ths}<th class="sc-week-th">Weekly</th>
          </tr></thead>
          <tbody>${trs}</tbody>
        </table></div>
      </div>`;
    });

    document.getElementById('tab-scorecard').innerHTML = html;
  }

  let scorecardSheets = [];
  let scorecardCurrent = '';

  async function loadScorecard(sheetName) {
    document.getElementById('tab-scorecard').innerHTML = '<div class="loading">Loading scorecard...</div>';
    try {
      const url = sheetName ? SCORECARD_URL + '?sheet=' + encodeURIComponent(sheetName) : SCORECARD_URL;
      const res = await fetch(url);
      const json = await res.json();
      scorecardSheets = json.sheets || [];
      scorecardCurrent = json.current || '';
      scorecardData = json.data || json;
      renderScorecard();
      renderSales();
    } catch(e) {
      document.getElementById('tab-scorecard').innerHTML = '<div class="loading">Failed to load scorecard.</div>';
    }
  }
</script>
</body>
</html>
