<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Ad Ventur</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; min-height: 100vh; }

    /* Gate */
    #gate { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .gate-box { background: linear-gradient(135deg, #07121f, #0d2240); border: 1px solid rgba(74,158,255,0.2); border-radius: 14px; padding: 40px 32px; text-align: center; width: 100%; max-width: 380px; margin: 0 20px; }
    .gate-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 6px; }
    .gate-sub { font-size: 0.8rem; color: #fff; margin-bottom: 28px; }
    .gate-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; padding: 12px 16px; margin-bottom: 12px; outline: none; }
    .gate-input:focus { border-color: rgba(74,158,255,0.5); }
    .gate-btn { width: 100%; background: #1a47ff; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; padding: 13px; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .gate-btn:hover { background: #1338d4; }
    .gate-error { font-size: 0.78rem; color: #f87171; margin-top: 10px; display: none; }

    #dashboard { display: none; }

    /* Header */
    .dash-header { background: #000; border-bottom: 1px solid rgba(255,255,255,0.06); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .dash-title { font-size: 1.05rem; font-weight: 900; }
    .dash-title span { color: #7dd8f8; }
    .dash-meta { font-size: 0.7rem; color: #fff; margin-top: 3px; }
    .refresh-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 700; padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 20px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 14px 18px; cursor: pointer; white-space: nowrap; transition: color 0.2s; }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { color: #7dd8f8; border-bottom-color: #1a47ff; }

    /* Date filter bar */
    .filter-bar { padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .presets { display: flex; flex-wrap: wrap; gap: 6px; }
    .preset-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .preset-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .preset-btn.active { background: #1a47ff; border-color: #1a47ff; color: #fff; }
    .filter-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px; }
    .date-range { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .date-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; padding: 6px 10px; outline: none; color-scheme: dark; }
    .date-input:focus { border-color: rgba(74,158,255,0.5); }
    .date-sep { font-size: 0.72rem; color: #fff; }
    .apply-btn { background: #1a47ff; border: none; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.68rem; font-weight: 700; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .apply-btn:hover { background: #1338d4; }
    .filter-label { font-size: 0.65rem; font-weight: 700; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Tab content */
    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: linear-gradient(135deg, #07121f, #0d2240); border: 1px solid rgba(74,158,255,0.15); border-radius: 10px; padding: 16px 18px; }
    .stat-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #7dd8f8; margin-bottom: 8px; }
    .stat-value { font-size: 1.45rem; font-weight: 900; color: #fff; line-height: 1; }
    .stat-value.green { color: #4ade80; }
    .stat-value.yellow { color: #facc15; }

    .loading { text-align: center; padding: 60px 0; color: #fff; font-size: 0.82rem; }

    /* Table */
    .table-wrap { overflow-x: auto; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.76rem; min-width: 600px; }
    thead tr { background: rgba(74,158,255,0.07); }
    th { text-align: left; padding: 11px 14px; font-size: 0.64rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #7dd8f8; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.07); }
    td { padding: 10px 14px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .badge-green { background: rgba(74,222,128,0.12); color: #4ade80; }
    .badge-red { background: rgba(248,113,113,0.12); color: #f87171; }
    .badge-yellow { background: rgba(250,204,21,0.12); color: #facc15; }
    .badge-blue { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .no-records { color: #fff; font-size: 0.82rem; padding: 20px 0; }

    @media (max-width: 600px) {
      .dash-header { padding: 14px 16px; }
      .filter-bar { padding: 12px 16px; }
      .tab-content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-divider { display: none; }
    }
  </style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <p class="gate-title">Ad Ventur Dashboard</p>
    <p class="gate-sub">Enter password to access</p>
    <input type="password" id="passInput" class="gate-input" placeholder="Password" />
    <button class="gate-btn" onclick="checkPass()">Enter</button>
    <p class="gate-error" id="gateError">Incorrect password.</p>
  </div>
</div>

<div id="dashboard">
  <div class="dash-header">
    <div>
      <p class="dash-title">Ad <span>Ventur</span> Dashboard</p>
      <p class="dash-meta" id="lastUpdated">Loading...</p>
    </div>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sales', this)">Sales Dashboard</button>
    <button class="tab-btn" onclick="switchTab('setter', this)">Setter Dashboard</button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <div class="presets">
      <button class="preset-btn active" id="preset-all" onclick="setPreset('all', this)">All Time</button>
      <button class="preset-btn" id="preset-today" onclick="setPreset('today', this)">Today</button>
      <button class="preset-btn" id="preset-yesterday" onclick="setPreset('yesterday', this)">Yesterday</button>
      <button class="preset-btn" id="preset-7d" onclick="setPreset('7d', this)">Last 7 Days</button>
      <button class="preset-btn" id="preset-30d" onclick="setPreset('30d', this)">Last 30 Days</button>
      <button class="preset-btn" id="preset-month" onclick="setPreset('month', this)">This Month</button>
    </div>
    <div class="filter-divider"></div>
    <div class="date-range">
      <input type="date" id="fromDate" class="date-input" />
      <span class="date-sep">to</span>
      <input type="date" id="toDate" class="date-input" />
      <button class="apply-btn" onclick="applyCustom()">Apply</button>
    </div>
  </div>

  <div id="tab-sales" class="tab-content active"><div class="loading">Loading...</div></div>
  <div id="tab-setter" class="tab-content"><div class="loading">Coming soon...</div></div>
</div>

<script>
  const TOKEN = ['patEVkaUO5ou', 'wH6Gm.f4b5891dee4a5ef0e3ec8e160', '9d810abbcba900b42ccb20b9d0ae1345c9eb69a'].join('');
  const BASE  = 'appiMw8gpaLv2WITA';
  const PASS  = '500k/m';

  // Cached records
  let cache = { closer: [], dialer: [], followup: [] };
  let filterFrom = null;
  let filterTo   = null;

  // Gate
  function unlock() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  }

  function checkPass() {
    if (document.getElementById('passInput').value === PASS) {
      localStorage.setItem('av_auth', '1');
      unlock();
    } else {
      document.getElementById('gateError').style.display = 'block';
    }
  }
  document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });

  if (localStorage.getItem('av_auth') === '1') unlock();

  // Tabs
  function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
  }

  // Date helpers
  function toISO(d) { return d.toISOString().substring(0, 10); }
  function today()   { const d = new Date(); return toISO(d); }
  function daysAgo(n){ const d = new Date(); d.setDate(d.getDate() - n); return toISO(d); }
  function monthStart(){ const d = new Date(); d.setDate(1); return toISO(d); }

  function setPreset(preset, btn) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = today();
    if (preset === 'all')       { filterFrom = null; filterTo = null; }
    else if (preset === 'today')     { filterFrom = t; filterTo = t; }
    else if (preset === 'yesterday') { const y = daysAgo(1); filterFrom = y; filterTo = y; }
    else if (preset === '7d')        { filterFrom = daysAgo(6); filterTo = t; }
    else if (preset === '30d')       { filterFrom = daysAgo(29); filterTo = t; }
    else if (preset === 'month')     { filterFrom = monthStart(); filterTo = t; }
    // sync date inputs
    document.getElementById('fromDate').value = filterFrom || '';
    document.getElementById('toDate').value   = filterTo   || '';
    renderAll();
  }

  function applyCustom() {
    filterFrom = document.getElementById('fromDate').value || null;
    filterTo   = document.getElementById('toDate').value   || null;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    renderAll();
  }

  function filterRecords(records, dateField) {
    if (!filterFrom && !filterTo) return records;
    return records.filter(r => {
      const raw = r.fields[dateField];
      if (!raw) return false;
      const d = raw.substring(0, 10);
      if (filterFrom && d < filterFrom) return false;
      if (filterTo   && d > filterTo)   return false;
      return true;
    });
  }

  // Fetch with pagination
  async function fetchAll(tableName) {
    const url = `https://api.airtable.com/v0/${BASE}/${encodeURIComponent(tableName)}`;
    const headers = { Authorization: `Bearer ${TOKEN}` };
    let records = [], offset = null;
    do {
      const p = new URLSearchParams({ pageSize: '100' });
      if (offset) p.append('offset', offset);
      const res = await fetch(`${url}?${p}`, { headers });
      const data = await res.json();
      if (data.records) records = records.concat(data.records);
      offset = data.offset || null;
    } while (offset);
    return records;
  }

  // Helpers
  const n   = v => parseFloat(v) || 0;
  const $   = v => { const x = n(v); return x === 0 ? '$0' : '$' + x.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); };
  const pct = (a, b) => b ? Math.round((a / b) * 100) + '%' : '0%';

  function badge(val) {
    if (!val) return '<span class="badge badge-blue">N/A</span>';
    const v = val.toLowerCase();
    if (v.includes('close') || v.includes('sold') || v.includes('won')) return `<span class="badge badge-green">${val}</span>`;
    if (v.includes('cancel') || v.includes('no show') || v.includes('lost')) return `<span class="badge badge-red">${val}</span>`;
    if (v.includes('follow') || v.includes('fu')) return `<span class="badge badge-yellow">${val}</span>`;
    return `<span class="badge badge-blue">${val}</span>`;
  }

  function card(label, value, cls) {
    return `<div class="stat-card"><p class="stat-label">${label}</p><p class="stat-value${cls ? ' '+cls : ''}">${value}</p></div>`;
  }

  function makeTable(headers, rows) {
    if (!rows.length) return '<p class="no-records">No records found for this date range.</p>';
    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(r => `<tr>${r.map(c => `<td>${c ?? ''}</td>`).join('')}</tr>`).join('');
    return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  // Renderers
  function renderSales() {
    const records = filterRecords(cache.closer, 'Date');
    const f = r => r.fields;

    const booked    = records.reduce((s,r) => s + n(f(r)['Calls booked']), 0);
    const showed    = records.reduce((s,r) => s + n(f(r)['Calls Showed']), 0);
    const cancelled = records.reduce((s,r) => s + n(f(r)['Cancelled calls']), 0);
    const disq      = records.reduce((s,r) => s + n(f(r)['Disqualified calls']), 0);
    const closed    = records.reduce((s,r) => s + n(f(r)['Deals closed']), 0);
    const deps      = records.reduce((s,r) => s + n(f(r)['Deposits']), 0);
    const cash      = records.reduce((s,r) => s + n(f(r)['Total cash collected']), 0);
    const rev       = records.reduce((s,r) => s + n(f(r)['Total revenue']), 0);
    const depCash   = records.reduce((s,r) => s + n(f(r)['Deposits cash collected']), 0);

    const kept = booked - cancelled;

    const html = `<div class="stats-grid">
      ${card('Calls Booked', booked)}
      ${card('Live Calls', showed)}
      ${card('Kept Calls', kept)}
      ${card('Deals Closed', closed)}
      ${card('Deposits', deps)}
      ${card('Close Rate (Booked)', pct(closed, booked), 'yellow')}
      ${card('Close Rate (Kept)', pct(closed, kept), 'yellow')}
      ${card('Show Rate (Kept)', pct(showed, kept), 'yellow')}
      ${card('Show Rate', pct(showed, booked), 'yellow')}
      ${card('Cancellations', cancelled)}
      ${card('Cancellation Rate', pct(cancelled, booked), 'yellow')}
      ${card('DQ Rate', pct(disq, showed), 'yellow')}
      ${card('Cash Collected', $(cash), 'green')}
      ${card('Revenue Generated', $(rev), 'green')}
      ${card('Deposits Collected', $(depCash), 'green')}
      ${card('AOV', closed ? $(Math.round(cash / closed)) : '$0', 'green')}
      ${card('Cash / Booked Call', booked ? $(Math.round(cash / booked)) : '$0', 'green')}
    </div>`;

    document.getElementById('tab-sales').innerHTML = html;
  }

  function renderAll() {
    renderSales();
  }

  async function loadAll() {
    document.getElementById('tab-sales').innerHTML = '<div class="loading">Loading...</div>';
    const [closer, dialer, followup] = await Promise.all([
      fetchAll('EOD Closer Table'),
      fetchAll('EOD Dialer Table'),
      fetchAll('Follow Up Payment Table')
    ]);
    cache = { closer, dialer, followup };
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();
    renderAll();
  }
</script>
</body>
</html>
